<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原型A - 电池格 + 暗色卡片</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #e0e0e0; font-family: -apple-system, 'Segoe UI', sans-serif; padding: 32px; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
  .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
  .header .sub { font-size: 13px; color: #666; margin-top: 4px; }
  .btn { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-ghost { background: #1a1d28; color: #aaa; border: 1px solid #2a2d38; }

  /* Stats Bar */
  .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-item { background: #1a1d28; border-radius: 10px; padding: 14px 16px; border: 1px solid #2a2d38; }
  .stat-item .label { font-size: 11px; color: #666; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-item .value { font-size: 24px; font-weight: 700; }
  .stat-item .sub { font-size: 11px; color: #555; margin-top: 2px; }

  /* Sort pills */
  .sort-bar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; }
  .sort-label { font-size: 12px; color: #555; margin-right: 4px; }
  .sort-pill { padding: 5px 14px; border-radius: 16px; font-size: 12px; cursor: pointer; border: 1px solid #2a2d38; background: #1a1d28; color: #888; transition: all 0.2s; }
  .sort-pill:hover { border-color: #444; }
  .sort-pill.active { border-color: var(--c); color: var(--c); background: color-mix(in srgb, var(--c) 10%, #1a1d28); }

  /* Model Row */
  .model-list { display: flex; flex-direction: column; gap: 2px; }
  .model-row {
    display: grid; grid-template-columns: 200px 1fr 56px;
    align-items: center; gap: 16px;
    padding: 14px 16px; background: #1a1d28; border-radius: 10px;
    border: 1px solid #2a2d38; transition: border-color 0.2s;
  }
  .model-row:hover { border-color: #3a3d48; }

  .model-info .name { font-size: 14px; font-weight: 600; color: #fff; }
  .model-info .tags { display: flex; gap: 6px; margin-top: 4px; }
  .model-info .tag { font-size: 10px; padding: 2px 8px; border-radius: 4px; background: #252830; color: #888; }

  /* Battery bars area */
  .bars { display: flex; flex-direction: column; gap: 6px; }
  .bar-row { display: flex; align-items: center; gap: 8px; }
  .bar-label { width: 32px; font-size: 11px; color: #555; text-align: right; flex-shrink: 0; }
  .bar-value { width: 64px; font-size: 11px; color: #888; text-align: right; flex-shrink: 0; font-variant-numeric: tabular-nums; }

  /* Battery */
  .battery { flex: 1; display: flex; gap: 2px; height: 14px; align-items: center; }
  .battery-cell {
    flex: 1; height: 100%; border-radius: 2px;
    background: #252830; transition: background 0.3s;
  }
  .battery-cap {
    width: 4px; height: 8px; background: #252830; border-radius: 0 2px 2px 0; flex-shrink: 0;
  }

  /* Score ring */
  .score-ring { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
  .score-ring .inner { width: 36px; height: 36px; border-radius: 50%; background: #1a1d28; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; }
  .score-ring .lbl { font-size: 9px; color: #555; text-align: center; margin-top: 3px; }

  /* Detail line */
  .detail-line { display: flex; gap: 14px; font-size: 10px; color: #444; margin-top: 4px; padding-left: 40px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>Model Monitor</h1>
    <div class="sub">过去 24 小时模型健康总览</div>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="btn btn-ghost">刷新</button>
    <button class="btn btn-primary">▶ 全量测试</button>
  </div>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="label">监控模型</div><div class="value" style="color:#6366f1">5</div><div class="sub">4 健康</div></div>
  <div class="stat-item"><div class="label">成功率</div><div class="value" style="color:#22c55e">70.0%</div><div class="sub">24h</div></div>
  <div class="stat-item"><div class="label">TTFB</div><div class="value" style="color:#8b5cf6">1.1s</div><div class="sub">平均</div></div>
  <div class="stat-item"><div class="label">吞吐</div><div class="value" style="color:#06b6d4">20.8t/s</div><div class="sub">平均</div></div>
  <div class="stat-item"><div class="label">测试次数</div><div class="value" style="color:#f59e0b">10</div><div class="sub">24h</div></div>
</div>

<div class="sort-bar">
  <span class="sort-label">排序</span>
  <span class="sort-pill active" style="--c:#22c55e">可靠性 ↓</span>
  <span class="sort-pill" style="--c:#6366f1">延迟</span>
  <span class="sort-pill" style="--c:#06b6d4">吞吐</span>
  <span class="sort-pill" style="--c:#f59e0b">网络</span>
</div>

<div class="model-list" id="models"></div>

<script>
const models = [
  { name:'gpt-oss-120b', channel:'CLIProxyAPI', type:'OpenAI', reliability:100, latency:93, throughput:50, network:100, reliabilityV:'100%', latencyV:'619ms', throughputV:'25.2t/s', networkV:'0ms', score:93, p50:'604ms', p99:'634ms', ttfb:'634ms', tps:'25.2' },
  { name:'minimax-m2.5', channel:'CLIProxyAPI', type:'OpenAI', reliability:100, latency:95, throughput:66, network:100, reliabilityV:'100%', latencyV:'482ms', throughputV:'33.2t/s', networkV:'0ms', score:95, p50:'482ms', p99:'482ms', ttfb:'482ms', tps:'33.2' },
  { name:'glm5', channel:'CLIProxyAPI', type:'OpenAI', reliability:100, latency:38, throughput:15, network:99, reliabilityV:'100%', latencyV:'4.2s', throughputV:'7.4t/s', networkV:'2ms', score:58, p50:'2.2s', p99:'6.2s', ttfb:'2.2s', tps:'7.4' },
  { name:'kimi-k2.5', channel:'CLIProxyAPI', type:'OpenAI', reliability:100, latency:2, throughput:34, network:99, reliabilityV:'100%', latencyV:'5.4s', throughputV:'17.2t/s', networkV:'2ms', score:62, p50:'928ms', p99:'9.8s', ttfb:'928ms', tps:'17.2' },
  { name:'deepseek-v3.2', channel:'CLIProxyAPI', type:'OpenAI', reliability:0, latency:0, throughput:0, network:0, reliabilityV:'0%', latencyV:'超时', throughputV:'-', networkV:'-', score:0, p50:'-', p99:'-', ttfb:'-', tps:'-' },
];

const dims = [
  { key:'reliability', label:'可靠', color:'#22c55e' },
  { key:'latency', label:'延迟', color:'#6366f1' },
  { key:'throughput', label:'吞吐', color:'#06b6d4' },
  { key:'network', label:'网络', color:'#f59e0b' },
];

const CELLS = 20;

function batteryHTML(pct, color) {
  const filled = Math.round(pct / 100 * CELLS);
  let cells = '';
  for (let i = 0; i < CELLS; i++) {
    const on = i < filled;
    // Gradient: filled cells get progressively brighter
    const opacity = on ? 0.4 + (i / CELLS) * 0.6 : 0;
    const bg = on ? color : '';
    const style = on ? `background:${color};opacity:${opacity.toFixed(2)}` : '';
    cells += `<div class="battery-cell" style="${style}"></div>`;
  }
  const capColor = filled === CELLS ? color : '#252830';
  return `<div class="battery">${cells}<div class="battery-cap" style="background:${capColor}"></div></div>`;
}

function scoreColor(s) {
  if (s >= 80) return '#22c55e';
  if (s >= 60) return '#eab308';
  if (s >= 40) return '#f97316';
  return '#ef4444';
}

function render() {
  const container = document.getElementById('models');
  container.innerHTML = models.map(m => {
    const sc = scoreColor(m.score);
    const barsHTML = dims.map(d => {
      const val = m[d.key];
      const valKey = d.key + 'V';
      return `
        <div class="bar-row">
          <span class="bar-label">${d.label}</span>
          ${batteryHTML(val, d.color)}
          <span class="bar-value">${m[valKey]}</span>
        </div>`;
    }).join('');

    return `
      <div class="model-row">
        <div class="model-info">
          <div class="name">${m.name}</div>
          <div class="tags">
            <span class="tag">${m.channel}</span>
            <span class="tag">${m.type}</span>
          </div>
        </div>
        <div>
          <div class="bars">${barsHTML}</div>
          <div class="detail-line">
            <span>P50 ${m.p50}</span>
            <span>P99 ${m.p99}</span>
            <span>TTFB ${m.ttfb}</span>
            <span>TPS ${m.tps}</span>
          </div>
        </div>
        <div style="text-align:center">
          <div class="score-ring" style="background:conic-gradient(${sc} ${m.score*3.6}deg, #252830 0deg)">
            <div class="inner" style="color:${sc}">${m.score}</div>
          </div>
          <div class="score-ring lbl">综合</div>
        </div>
      </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
